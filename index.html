
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Globalinteriorconcepts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #edeae6;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        
        /* ── Google Translate: hide UI chrome but keep banner in DOM so JS can reach it ── */

        /* Move the top banner off-screen instead of display:none so we can click restore */
        .goog-te-banner-frame.skiptranslate,
        .skiptranslate > iframe {
            position: fixed !important;
            top: -500px !important;
            left: -9999px !important;
            width: 1px !important;
            height: 1px !important;
            z-index: -1 !important;
        }
        /* Prevent GT from pushing the body down */
        body {
            top: 0px !important;
            position: static !important;
            margin-top: 0px !important;
        }
        /* Hide the GT gadget wrapper text/logo */
        body > .skiptranslate:not(iframe) {
            display: none !important;
        }
        /* Hide GT branding/logo/tooltip elements — but NOT the widget div or restore button */
        .goog-logo-link,
        .goog-te-gadget img,
        .goog-te-gadget > span > a,
        .VIpgJd-ZVi9od-l4eHX-hSRGPd {
            display: none !important;
        }
        .goog-te-gadget {
            color: transparent !important;
            font-size: 0 !important;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>

    <!--
      Google Translate widget — initialised here (before React boots) so there are
      no race conditions.  The hidden div stays in the DOM permanently so the widget
      only ever needs to be constructed once.
    -->
    <div id="google_translate_element" aria-hidden="true"
         style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none">
    </div>
    <script>
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          { pageLanguage: 'nl', autoDisplay: false },
          'google_translate_element'
        );
      }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async></script>

<script type="module" src="/index.tsx"></script>
</body>
</html>
